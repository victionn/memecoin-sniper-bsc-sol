<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Uxento Injector</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size:14px; color:#0c1620; }
    body { margin:0; padding:12px; width:380px; }
    h3 { margin: 0 0 8px 0; }
    label{ display:block; margin-top:8px; font-weight:600; font-size:12px; color:#0b1a26;}
    input[type="text"], textarea, select { width:100%; box-sizing:border-box; padding:8px; border-radius:6px; border:1px solid #d0d7dc; margin-top:6px; font-size:13px; }
    textarea { min-height:90px; resize:vertical; }
    .row { display:flex; gap:8px; }
    .row > * { flex:1 }
    .btn { margin-top:10px; width:100%; padding:10px 12px; border-radius:8px; border:0; background:#0b7cff; color:white; font-weight:700; cursor:pointer; }
    .btn.secondary { background:#eef2f6; color:#0b1a26; border:1px solid #dfe7ee; }
    .btn.warn { background:#ff6a3d; }
    .muted { color:#7f8a90; font-size:12px; margin-top:6px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-top:8px; }
    .note { margin-top:8px; font-size:12px; color:#2b6a4a; }
    .small { font-size:12px; color:#5b6b73; margin-top:6px; }
    .inline { display:flex; gap:8px; align-items:center; margin-top:8px; }
    #log { margin-top:10px; background:#0a0f14; color:#dff; min-height:80px; padding:8px; border-radius:8px; white-space:pre-wrap; font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono"; }
  </style>
</head>
<body>
  <h3>Uxento Card Injector</h3>

  <div class="grid">
    <button id="btnLoadCfg" class="btn secondary">Load from config</button>
    <button id="btnApplyType" class="btn secondary">Apply profile to form</button>
  </div>

  <label for="type">Card type</label>
  <select id="type" aria-label="Card type">
    <option value="tweet">Tweet (plain)</option>
    <option value="reply">Reply</option>
    <option value="quote">Quote</option>
    <option value="retweet">Retweet / Repost</option>
  </select>

  <label for="name">Author name</label>
  <input id="name" type="text" placeholder="James Wade">

  <label for="handle">Handle (without @)</label>
  <input id="handle" type="text" placeholder="Daily_Express">

  <label for="body">Body text</label>
  <textarea id="body" placeholder="Write the tweet text..."></textarea>

  <!-- NEW: media image URL -->
  <label for="mediaUrl">Media image URL (optional)</label>
  <input
    id="mediaUrl"
    type="text"
    placeholder="https://pbs.twimg.com/media/G5mxokaWQAAZRwn.jpg"
  />

  <label for="referencedUrl">Referenced Tweet URL</label>
  <input id="referencedUrl" type="text" placeholder="https://x.com/<user>/status/<id>">

  <div class="inline">
    <input id="includeLinks" type="checkbox" checked />
    <label for="includeLinks" style="margin:0; font-weight:600">Include status links</label>
  </div>

  <details style="margin-top:8px;">
    <summary><strong>Debug options</strong></summary>
    <div class="inline">
      <input id="dbgFlash" type="checkbox" checked />
      <label for="dbgFlash" style="margin:0;">Flash injected card</label>
    </div>
    <div class="inline">
      <input id="dbgConsole" type="checkbox" checked />
      <label for="dbgConsole" style="margin:0;">Console log in page</label>
    </div>
    <div class="inline">
      <input id="dbgDataAttrs" type="checkbox" checked />
      <label for="dbgDataAttrs" style="margin:0;">Add data-attrs (type, ids, uid)</label>
    </div>
  </details>

  <div class="grid">
    <button id="inject1" class="btn">Inject</button>
    <button id="inject5" class="btn">Inject ×5</button>
  </div>

  <div class="grid">
    <button id="btnPing" class="btn secondary">Ping tab / URL</button>
    <button id="btnOutline" class="btn secondary">Outline cards</button>
  </div>

  <div class="grid">
    <button id="btnClearMine" class="btn warn">Clear my injected</button>
    <button id="btnForceMutation" class="btn secondary">Force mutation</button>
  </div>

  <div class="small">Open while a <strong>uxento.io</strong> tab is active for best results.</div>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
